plugins {
    id 'java'
    id "me.champeau.centralpublishing" version "0.6.0"
}

group = 'io.github.nicolascunha'
version = '1.0.0'

repositories {
    mavenCentral()
}

subprojects {
    apply plugin: 'maven-publish'
    apply plugin: 'java-library'
    apply plugin: 'signing'

    group = 'io.github.nicolascunha'
    version = '1.0.0'

    java {
        withJavadocJar()
        withSourcesJar()
    }

    publishing {
        publications {
            mavenJava(MavenPublication) {
                from components.java

                groupId = 'io.github.nicolascunha'
                artifactId = project.name
                version = '1.0.0'

                pom {
                    name = "SJL - ${project.name}"
                    description = 'Simple Java Library modular components'
                    url = 'https://github.com/NicolasCunha/sjl'

                    licenses {
                        license {
                            name = 'The Apache License, Version 2.0'
                            url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                        }
                    }
                    developers {
                        developer {
                            id = 'nicolascunha'
                            name = 'Nicolas Filipe Cunha'
                            email = 'nicolascunha17@gmail.com'
                        }
                    }
                    scm {
                        connection = 'scm:git:git://github.com/NicolasCunha/sjl.git'
                        developerConnection = 'scm:git:ssh://github.com/NicolasCunha/sjl.git'
                        url = 'https://github.com/NicolasCunha/sjl'
                    }
                }
            }
        }
    }

    signing {
        def signingKey = System.getenv("GPG_SIGNING_KEY")
        def signingPassword = System.getenv("GPG_PASSPHRASE")

        if (signingKey != null) {
            useInMemoryPgpKeys(signingKey, signingPassword)
            sign publishing.publications.mavenJava
        }
    }
}

centralPublishing {
    publishingAllPublications()

    username = System.getenv("MAVEN_USERNAME")
    password = System.getenv("MAVEN_PASSWORD")

    deploymentName = "SJL Release ${version}"
}

test {
    useJUnitPlatform()
}